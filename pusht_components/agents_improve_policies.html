<p class="meta" id="meta"></p>
<script>
const META={"Codex": 43, "Claude Code": 73, "Kimi Code": 66};
const tabs=[...document.querySelectorAll('.tab')], traces=[...document.querySelectorAll('.trace')], meta=document.getElementById('meta');
let timer;
function show(a){
  tabs.forEach(t=>t.classList.toggle('on',t.dataset.a===a));
  traces.forEach(p=>p.style.display=p.dataset.a===a?'':'none');
  const path=traces.find(p=>p.dataset.a===a), len=path.getTotalLength();
  path.style.transition='none'; path.style.strokeDasharray=len; path.style.strokeDashoffset=len;
  path.getBoundingClientRect();
  path.style.transition='stroke-dashoffset 3s linear'; path.style.strokeDashoffset=0;
  meta.textContent=`${a} — ${META[a]} steps`;
}
tabs.forEach(t=>t.onclick=()=>show(t.dataset.a));
show('Codex');
</script>
